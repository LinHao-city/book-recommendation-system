<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Book Background -->
  <rect x="20" y="20" width="160" height="260" rx="8" fill="url(#bookGradient)" opacity="0.1"/>

  <!-- Book Spine -->
  <rect x="20" y="20" width="160" height="260" rx="8" fill="none" stroke="url(#bookGradient)" stroke-width="2"/>

  <!-- Book Pages -->
  <rect x="30" y="30" width="140" height="240" rx="4" fill="white" opacity="0.9"/>

  <!-- Book Lines -->
  <line x1="45" y1="50" x2="155" y2="50" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="45" y1="70" x2="155" y2="70" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="45" y1="90" x2="135" y2="90" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="45" y1="110" x2="145" y2="110" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="45" y1="130" x2="125" y2="130" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Book Icon in Center -->
  <circle cx="100" cy="150" r="25" fill="url(#bookGradient)" opacity="0.2"/>
  <path d="M90 150 L90 160 Q90 165 95 165 L105 165 Q110 165 110 160 L110 150"
        fill="none" stroke="url(#bookGradient)" stroke-width="2" stroke-linecap="round"/>
  <path d="M90 140 Q90 135 95 135 L105 135 Q110 135 110 140"
        fill="none" stroke="url(#bookGradient)" stroke-width="2" stroke-linecap="round"/>

  <!-- Text -->
  <text x="100" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b" font-weight="600">暂无封面</text>
</svg>